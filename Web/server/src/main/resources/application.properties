spring.application.name=Nutri-Track

# SQL Server LocalDB configuration with Windows Authentication
spring.datasource.url=jdbc:postgresql://localhost:5432/jobPortal
spring.datasource.username=postgres
spring.datasource.password=Mac2025##
#spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
server.tomcat.relaxed-path-chars=|,{,},[,]
server.tomcat.relaxed-query-chars=|,{,},[,]
logging.level.org.apache.coyote.http11.Http11Processor=DEBUG
logging.level.org.springframework.web=DEBUG

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Query Optimization - Enable query logging for slow queries
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=100

# HikariCP Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# Port
server.port=9090

